<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30 Days of Creativity – @adriiiinaline</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ig-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        .ig-text-gradient {
            background: var(--ig-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .glass:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .timeline-container {
            display: flex;
            overflow-x: auto;
            gap: 2rem;
            padding: 4rem 2rem;
            scrollbar-width: none;
        }

        .timeline-container::-webkit-scrollbar { display: none; }

        .day-node {
            flex: 0 0 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .day-bubble {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            padding: 4px;
            background: var(--ig-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .bubble-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid #000;
            overflow: hidden;
            background-color: #111;
        }

        .bubble-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .day-node:hover { transform: translateY(-10px) scale(1.1); }
        .day-node:hover .bubble-image { transform: scale(1.15); }

        .day-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .day-node:hover .day-label { color: #fff; }

        .reel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        #surprise-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <header class="min-h-screen flex flex-col items-center justify-center text-center px-6 relative">
        <div class="z-20">
            <h1 class="text-7xl md:text-9xl font-extrabold mb-4 tracking-tighter">
                30<span class="ig-text-gradient">/30</span>
            </h1>
            <p class="text-xl md:text-2xl font-light text-gray-400 max-w-xl mx-auto">
                Completed by <span class="text-white font-bold">@adriiiinaline</span>
            </p>
        </div>
    </header>

    <section class="py-10">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-2xl font-bold mb-8 text-white uppercase tracking-widest text-center md:text-left">The Journey</h2>
            <div class="timeline-container" id="timeline"></div>
        </div>
    </section>

    <section class="py-24 px-6 max-w-7xl mx-auto">
        <h2 class="text-3xl font-bold mb-10 text-center uppercase tracking-widest ig-text-gradient">Featured Highlights</h2>
        <div class="reel-grid">
            <!-- Card 1 -->
            <div class="glass p-6 flex flex-col items-center" onclick="showSurprise('Your vision and creativity over these 30 days have been absolutely inspiring! ✨')">
                <div class="w-full aspect-[9/16] rounded-2xl overflow-hidden mb-4 border border-white/10">
                    <img src="https://i.ibb.co/vfGKYtT/IMG-20260323-212720.jpg" class="w-full h-full object-cover">
                </div>
                <span class="text-xs font-bold text-pink-400 uppercase">Tap for a surprise 🎁</span>
            </div>

            <!-- Card 2 -->
            <div class="glass p-6 flex flex-col items-center" onclick="showSurprise('Every snapshot tells a story of your growth and passion. Keep shining! 🌟')">
                <div class="w-full aspect-[9/16] rounded-2xl overflow-hidden mb-4 border border-white/10">
                    <img src="https://i.ibb.co/bj1fw0KN/Screenshot-2026-0323-215946.png" class="w-full h-full object-cover">
                </div>
                <span class="text-xs font-bold text-pink-400 uppercase">Tap for a surprise 🎁</span>
            </div>

            <!-- Card 3 -->
            <div class="glass p-6 flex flex-col items-center" onclick="showSurprise('The art of creation is a journey, and yours is just getting started! 🎨')">
                <div class="w-full aspect-[9/16] rounded-2xl overflow-hidden mb-4 border border-white/10">
                    <img src="https://i.ibb.co/M5D5K50P/Screenshot-2026-0323-215931.png" class="w-full h-full object-cover">
                </div>
                <span class="text-xs font-bold text-pink-400 uppercase">Tap for a surprise 🎁</span>
            </div>

            <!-- Card 4 -->
            <div class="glass p-6 flex flex-col items-center" onclick="showSurprise('Consistency is key, and you\'ve mastered the lock! 🔑')">
                <div class="w-full aspect-[9/16] rounded-2xl overflow-hidden mb-4 border border-white/10">
                    <img src="https://i.ibb.co/M5D5K50P/Screenshot-2026-0323-215931.png" class="w-full h-full object-cover">
                </div>
                <span class="text-xs font-bold text-pink-400 uppercase">Tap for a surprise 🎁</span>
            </div>

            <!-- Card 5 -->
            <div class="glass p-6 flex flex-col items-center" onclick="showSurprise('Thirty days of excellence. What an incredible milestone! 🏆')">
                <div class="w-full aspect-[9/16] rounded-2xl overflow-hidden mb-4 border border-white/10">
                    <img src="https://i.ibb.co/M5D5K50P/Screenshot-2026-0323-215931.png" class="w-full h-full object-cover">
                </div>
                <span class="text-xs font-bold text-pink-400 uppercase">Tap for a surprise 🎁</span>
            </div>
        </div>
    </section>

    <div id="surprise-modal" onclick="closeModal()">
        <div class="glass p-10 max-w-md w-full text-center border border-pink-500/50" onclick="event.stopPropagation()">
            <div class="text-5xl mb-6">🎉</div>
            <p id="surprise-text" class="text-xl font-bold leading-relaxed mb-8"></p>
            <button onclick="closeModal()" class="w-full py-3 rounded-xl bg-white text-black font-bold uppercase tracking-widest hover:bg-pink-500 hover:text-white transition-all">Close</button>
        </div>
    </div>

    <script async src="//www.instagram.com/embed.js"></script>
    <script>
        function showSurprise(msg) {
            document.getElementById('surprise-text').innerText = msg;
            document.getElementById('surprise-modal').style.display = 'flex';
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        }

        function closeModal() {
            document.getElementById('surprise-modal').style.display = 'none';
        }

        function fireWorks() {
            confetti({
                particleCount: 150,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#f09433', '#e6683c', '#dc2743', '#cc2366', '#bc1888']
            });
            setTimeout(() => {
                confetti({
                    particleCount: 60,
                    angle: 60,
                    spread: 60,
                    origin: { x: 0 },
                    colors: ['#f09433', '#bc1888']
                });
                confetti({
                    particleCount: 60,
                    angle: 120,
                    spread: 60,
                    origin: { x: 1 },
                    colors: ['#f09433', '#bc1888']
                });
            }, 300);
        }

        window.onload = () => {
            fireWorks();
            const timeline = document.getElementById('timeline');
            
            // Image URLs
            const mainImg = "https://i.ibb.co/XNYQtwz/Screenshot-2026-0323-215128.png";
            const specialImg = "https://i.ibb.co/M5D5K50P/Screenshot-2026-0323-215931.png";

            for (let i = 1; i <= 30; i++) {
                const node = document.createElement('div');
                node.className = 'day-node';
                
                // Logic to set specific images for 4, 5, 6, and 30
                let currentImg = mainImg;
                if (i === 4 || i === 5 || i === 6 || i === 30) {
                    currentImg = specialImg;
                }

                node.innerHTML = `
                    <div class="day-bubble">
                        <div class="bubble-inner">
                            <img src="${currentImg}" class="bubble-image" alt="Day ${i}">
                        </div>
                    </div>
                    <span class="day-label">Day ${i}</span>
                `;
                
                node.onclick = () => {
                    confetti({ 
                        particleCount: 40, 
                        spread: 50, 
                        origin: { y: 0.8 },
                        colors: ['#f09433', '#dc2743', '#bc1888']
                    });
                };

                timeline.appendChild(node);
            }
        };
    </script>
</body>
</html>
